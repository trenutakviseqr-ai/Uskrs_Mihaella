<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sretan Uskrs 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  color:#4a3f3f;
  text-align:center;
  overflow-x:hidden;
  background:#f8f2f4;
}

/* ===== BACKGROUND FIX ===== */
.bg-section{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:40px 20px;

  background-repeat:no-repeat;
  background-position:center;
  background-size:contain; /* KLJUČNO */
  background-color:#f8f2f4;
}

/* overlay za bolju čitljivost */
.overlay-light{
  background-color:rgba(255,255,255,0.7);
  padding:30px 20px;
  border-radius:20px;
}

/* INTRO */
#welcome{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;

  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("hero.jpg");
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  background-color:#000;
}

#welcome h1{
  color:white;
  font-family:'Playfair Display';
  font-size:clamp(26px,5vw,40px);
}

.openBtn{
  margin-top:20px;
  padding:14px 28px;
  border:none;
  border-radius:30px;
  background:#c48a97;
  color:white;
  cursor:pointer;
}

/* HERO */
.hero{
  background-image:url("hero1.jpg");
}

.hero h1{
  font-family:'Playfair Display';
  font-size:clamp(30px,5vw,50px);
}

.subtitle{
  margin-top:10px;
  font-size:clamp(14px,3vw,18px);
}

/* CARD */
.card{
  max-width:700px;
  margin:40px auto;
  padding:25px 20px;
  background:white;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

#typing{
  font-size:clamp(14px,3.5vw,17px);
  line-height:1.7;
  white-space:pre-line;
}

/* PROMO */
.salon-promo,
.qr-promo{
  max-width:700px;
  margin:20px auto;
  padding:25px 20px;
  border-radius:15px;
}

.salon-promo{background:white;}
.qr-promo{background:#f3e7eb;}

h2,h3{
  font-family:'Playfair Display';
}

.cta{
  margin-top:15px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:#c48a97;
  color:white;
  cursor:pointer;
}

/* FLOAT */
.layer{
  position:fixed;
  inset:0;
  pointer-events:none;
}
.item{
  position:absolute;
  animation:float linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* FOOTER */
.footer{
  margin:30px 0;
  font-size:13px;
  opacity:0.7;
}

/* ===== DESKTOP FIX ===== */
@media(min-width:900px){
  .bg-section{
    background-size:cover; /* desktop može crop jer izgleda bolje */
  }
  #welcome{
    background-size:cover;
  }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="welcome">
  <h1>Uskrsno iznenađenje 🌸</h1>
  <button class="openBtn" onclick="startExperience()">Otvori čestitku</button>
</div>

<!-- HERO -->
<div class="bg-section hero">
  <div class="overlay-light">
    <h1>Sretan Uskrs 🐣</h1>
    <p class="subtitle">Mihaella Geranij 🌿💛</p>
  </div>
</div>

<!-- CARD -->
<div class="card">
  <p id="typing"></p>
</div>

<!-- SALON -->
<div class="salon-promo">
  <h2>💆‍♀️ Mihaella Geranij</h2>
  <p>
    Masaže • Depilacije • Pedikura • Anticelulitni tretmani • Maderoterapija  
    Briga o vašem tijelu i opuštanje na jednom mjestu 💛
  </p>
  <button class="cta" onclick="window.location.href='https://www.instagram.com/mihaella_geranij'">
    Posjeti Instagram 📲
  </button>
</div>

<!-- QR -->
<div class="qr-promo">
  <h3>🎁 Personalizirane QR čestitke</h3>
  <p>Iznenadi nekoga digitalnom uspomenom 💛</p>
  <button class="cta" onclick="window.location.href='https://instagram.com/trenutakviseqr'">
    Pogledaj više 💌
  </button>
</div>

<div class="footer">Mihaella Geranij 🌸</div>

<div class="layer" id="layer"></div>

<script>
function startExperience(){
  document.getElementById("welcome").style.display="none";
  createElements();
  typing();
}

function createElements(){
  const icons=["🐣","🐰","🥚","🌸","🌷"];
  for(let i=0;i<30;i++){
    let el=document.createElement("div");
    el.className="item";
    el.innerHTML=icons[Math.floor(Math.random()*icons.length)];
    el.style.left=Math.random()*100+"vw";
    el.style.animationDuration=(6+Math.random()*10)+"s";
    el.style.fontSize=(18+Math.random()*18)+"px";
    document.getElementById("layer").appendChild(el);
  }
}

const message=`Dragi klijenti i klijentice 🌸,

želim vam sretan i blagoslovljen Uskrs! 🐣💛

Neka vam ovi blagdani donesu mir, opuštanje i puno lijepih trenutaka.

Hvala vam na povjerenju 💛

Vaša Mihaella Geranij 🌿`;

let i=0;
function typing(){
  if(i<message.length){
    document.getElementById("typing").innerHTML += message.charAt(i);
    i++;
    setTimeout(typing,30);
  }
}
</script>

</body>
</html>
