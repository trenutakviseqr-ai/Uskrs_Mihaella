<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sretan Uskrs 🌸</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  color:#4a3f3f;
  overflow-x:hidden;
  background:#f1e3e7;
}

/* FULL BG */
.full-bg{
  position:relative;
  width:100%;
  min-height:100svh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;

  background-size:cover;
  background-position:center;
  animation:zoomBg 20s ease-in-out infinite alternate;
}

/* MAGLA - SVIJETLA */
.full-bg::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.35); /* svijetla lagana magla */
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  color:#4a3f3f; /* tamna boja za kontrast */
  max-width:800px;
  animation:fadeUp 1.2s ease;
  text-shadow: 0 2px 6px rgba(255,255,255,0.7); /* lagana sjena preko svijetle magle */
}

/* INTRO */
#welcome{
  position:fixed;
  inset:0;
  z-index:9999;

  background:
    linear-gradient(rgba(255,255,255,0.35), rgba(255,255,255,0.35)),
    url("hero.jpg");
  background-size:cover;
  background-position:center;
}

/* BUTTON */
.openBtn, .cta{
  margin-top:20px;
  padding:14px 30px;
  border:none;
  border-radius:40px;
  background:#c48a97;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s ease;
}

.openBtn:hover, .cta:hover{
  transform:translateY(-4px) scale(1.05);
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

/* HERO */
.hero{
  background-image:linear-gradient(rgba(255,255,255,0.35), rgba(255,255,255,0.35)), url("hero1.jpg");
}

/* CARD */
.card{
  max-width:800px;
  margin:60px auto;
  padding:35px 25px;
  background:white;
  border-radius:25px;
  box-shadow:0 15px 40px rgba(0,0,0,0.1);
  animation:fadeUp 1s ease;
}

/* SECTIONS */
.salon-promo,
.qr-promo{
  max-width:800px;
  margin:30px auto;
  padding:35px 25px;
  border-radius:25px;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  animation:fadeUp 1.2s ease;
}

.qr-promo{
  background:#f3e7eb;
}

/* HEADINGS */
h1,h2,h3{
  font-family:'Playfair Display';
  position:relative;
}

/* underline animacija */
h2::after, h3::after{
  content:"";
  display:block;
  width:0;
  height:2px;
  background:#c48a97;
  margin:10px auto 0;
  transition:0.5s;
}
h2:hover::after, h3:hover::after{
  width:60px;
}

/* FLOAT */
.layer{
  position:fixed;
  inset:0;
  pointer-events:none;
}
.item{
  position:absolute;
  animation:float linear infinite;
}

/* ANIMATIONS */
@keyframes float{
  0%{transform:translateY(100vh) rotate(0deg);}
  100%{transform:translateY(-10vh) rotate(360deg);}
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

@keyframes zoomBg{
  from{background-size:100%;}
  to{background-size:110%;}
}

/* FOOTER */
.footer{
  text-align:center;
  margin:50px 0 20px;
  opacity:0.7;
}

/* MOBILE */
@media(max-width:768px){
  .full-bg::before{
    background:rgba(255,255,255,0.45);
  }
}
</style>
</head>

<body>

<div id="welcome" class="full-bg">
  <div class="content">
    <h1>Uskrsno iznenađenje 🌸</h1>
    <button class="openBtn" onclick="startExperience()">Otvori čestitku</button>
  </div>
</div>

<div class="hero full-bg">
  <div class="content">
    <h1>Sretan Uskrs 🐣</h1>
    <p>Mihaella Geranij 🌿💛</p>
  </div>
</div>

<div class="card">
  <p id="typing"></p>
</div>

<div class="salon-promo">
  <h2>💆‍♀️ Mihaella Geranij</h2>
  <p>
    Masaže • Depilacije • Pedikura • Anticelulitni tretmani • Maderoterapija  
    Briga o vašem tijelu i opuštanje na jednom mjestu 💛
  </p>
  <button class="cta" onclick="window.location.href='https://www.instagram.com/mihaella_geranij'">
    Posjeti Instagram 📲
  </button>
</div>

<div class="qr-promo">
  <h3>🎁 Personalizirane QR čestitke</h3>
  <p>Iznenadi nekoga digitalnom uspomenom 💛</p>
  <button class="cta" onclick="window.location.href='https://instagram.com/trenutakviseqr'">
    Pogledaj više 💌
  </button>
</div>

<div class="footer">Mihaella Geranij 🌸</div>

<div class="layer" id="layer"></div>

<script>
function startExperience(){
  document.getElementById("welcome").style.display="none";
  createElements();
  typing();
}

function createElements(){
  const icons=["🐣","🐰","🥚","🌸","🌷","🍅"];
  for(let i=0;i<40;i++){
    let el=document.createElement("div");
    el.className="item";
    el.innerHTML=icons[Math.floor(Math.random()*icons.length)];
    el.style.left=Math.random()*100+"vw";
    el.style.animationDuration=(5+Math.random()*8)+"s";
    el.style.fontSize=(18+Math.random()*22)+"px";
    document.getElementById("layer").appendChild(el);
  }
}

const message=`Dragi klijenti i klijentice 🌸,

želim vam sretan i blagoslovljen Uskrs! 🐣💛

Neka vam ovi blagdani donesu mir, opuštanje i puno lijepih trenutaka.

Hvala vam na povjerenju 💛

Vaša Mihaella Geranij 🌿`;

let i=0;
function typing(){
  if(i<message.length){
    document.getElementById("typing").innerHTML += message.charAt(i);
    i++;
    setTimeout(typing,25);
  }
}
</script>

</body>
</html>
